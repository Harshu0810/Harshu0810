<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 350" width="100%" height="100%">
<linearGradient id="goldLinear" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#FFE87C" />
        <stop offset="50%" stop-color="#FFD700" />
        <stop offset="100%" stop-color="#D4AF37" />
    </linearGradient>

    <linearGradient id="fadeLine" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" stop-color="#FFD700" stop-opacity="0.8" />
        <stop offset="100%" stop-color="#FFD700" stop-opacity="0" />
    </linearGradient>

    <filter id="intenseGlow" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur stdDeviation="4" result="blur1" />
        <feGaussianBlur stdDeviation="10" result="blur2" />
        <feMerge>
            <feMergeNode in="blur2" />
            <feMergeNode in="blur1" />
            <feMergeNode in="SourceGraphic" />
        </feMerge>
    </filter>

    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
        <feGaussianBlur stdDeviation="3" result="blur" />
        <feMerge>
            <feMergeNode in="blur" />
            <feMergeNode in="SourceGraphic" />
        </feMerge>
    </filter>

    <pattern id="techGrid" width="30" height="30" patternUnits="userSpaceOnUse">
        <circle cx="2" cy="2" r="1" fill="#FFFFFF" fill-opacity="0.04" />
        <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#FFFFFF" stroke-opacity="0.01" stroke-width="1" />
    </pattern>

    <g id="hexNode">
        <polygon points="0,-35 30.31,-17.5 30.31,17.5 0,35 -30.31,17.5 -30.31,-17.5" 
                 fill="#1A233A" fill-opacity="0.3" 
                 stroke="#FFD700" stroke-width="1.5" stroke-opacity="0.25" />
        <polygon points="0,-25 21.65,-12.5 21.65,12.5 0,25 -21.65,12.5 -21.65,-12.5" 
                 fill="none" stroke="#FFD700" stroke-width="0.5" stroke-opacity="0.1" />
    </g>
</defs>

<rect width="1000" height="350" fill="url(#bgGradient)" rx="16" />
<rect width="1000" height="350" fill="url(#techGrid)" rx="16" />

<g fill="none" stroke="#FFFFFF" stroke-opacity="0.02" stroke-width="1">
    <path d="M -50 150 Q 200 80 450 180 T 1050 100" />
    <path d="M -50 200 Q 200 130 450 230 T 1050 150" />
    <path d="M -50 250 Q 200 180 450 280 T 1050 200" />
</g>

<g stroke="#FFD700" stroke-width="2" fill="none" opacity="0.6">
    <path d="M 25 55 L 25 25 L 55 25" filter="url(#softGlow)" />
    <circle cx="25" cy="25" r="2" fill="#FFD700" />
    <path d="M 25 295 L 25 325 L 55 325" filter="url(#softGlow)" />
    <circle cx="25" cy="325" r="2" fill="#FFD700" />
    <path d="M 975 55 L 975 25 L 945 25" filter="url(#softGlow)" />
    <circle cx="975" cy="25" r="2" fill="#FFD700" />
    <path d="M 975 295 L 975 325 L 945 325" filter="url(#softGlow)" />
    <circle cx="975" cy="325" r="2" fill="#FFD700" />
</g>

<rect x="40" y="70" width="3" height="210" fill="#FFD700" filter="url(#intenseGlow)">
    <animate attributeName="opacity" values="0.6; 1; 0.6" dur="4s" repeatCount="indefinite" />
</rect>

<g transform="translate(70, 115)">
    <text x="0" y="-35" font-family="'Courier New', monospace" font-size="11" fill="#FFD700" opacity="0.5" letter-spacing="2">
        SYS.STATUS // NEURAL_NET_ACTIVE
    </text>

    <text x="0" y="5" font-family="system-ui, -apple-system, sans-serif" font-weight="900" font-size="56" fill="#FFFFFF" letter-spacing="1">
        Harshit <tspan fill="url(#goldLinear)" filter="url(#softGlow)">Goyal</tspan>
    </text>

    <g transform="translate(0, 35)">
        <rect width="340" height="44" rx="22" fill="#FFD700" fill-opacity="0.06" stroke="#FFD700" stroke-opacity="0.4" stroke-width="1" />
        
        <g transform="translate(18, 14)" stroke="#FFD700" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="0,0 6,8 0,16" />
            <line x1="10" y1="16" x2="18" y2="16" />
            <circle cx="-10" cy="8" r="1.5" fill="#FFD700" stroke="none">
                 <animate attributeName="opacity" values="0;1;0" dur="2s" repeatCount="indefinite" />
            </circle>
        </g>

        <text x="50" y="27" font-family="'Courier New', monospace" font-weight="700" font-size="15" fill="#E2E8F0" letter-spacing="1">
            DATA SCIENTIST &amp; ML ENGINEER
        </text>
    </g>
</g>

<path d="M 70 230 L 350 230 L 380 260 L 550 260" fill="none" stroke="url(#fadeLine)" stroke-width="1.5" />
<circle cx="550" cy="260" r="2" fill="#FFD700" opacity="0.5" />

<g transform="translate(800, 115)">
    <g stroke="#FFD700" stroke-width="1" stroke-opacity="0.2">
        <line x1="0" y1="0" x2="0" y2="-70" />
        <line x1="0" y1="0" x2="0" y2="70" />
        <line x1="0" y1="0" x2="60.62" y2="-35" />
        <line x1="0" y1="0" x2="60.62" y2="35" />
        <line x1="0" y1="0" x2="-60.62" y2="-35" />
        <line x1="0" y1="0" x2="-60.62" y2="35" />
    </g>

    <use href="#hexNode" x="-60.62" y="-35" />
    <use href="#hexNode" x="-60.62" y="35" />
    <use href="#hexNode" x="60.62" y="-35" />
    <use href="#hexNode" x="60.62" y="35" />
    <use href="#hexNode" x="0" y="-70" />
    <use href="#hexNode" x="0" y="70" />

    <g>
        <polygon points="0,-35 30.31,-17.5 30.31,17.5 0,35 -30.31,17.5 -30.31,-17.5" 
                 fill="#FFD700" fill-opacity="0.08" 
                 stroke="#FFD700" stroke-width="2" filter="url(#softGlow)" />
        
        <circle cx="0" cy="0" r="14" fill="#FFD700" fill-opacity="0.1" stroke="#FFD700" stroke-width="1.5">
            <animate attributeName="r" values="12; 16; 12" dur="3s" repeatCount="indefinite" />
        </circle>
        <circle cx="0" cy="0" r="6" fill="#FFD700" filter="url(#intenseGlow)">
            <animate attributeName="opacity" values="0.7; 1; 0.7" dur="1.5s" repeatCount="indefinite" />
        </circle>

        <circle cx="0" cy="0" r="24" fill="none" stroke="#FFD700" stroke-width="1" stroke-dasharray="6 8" stroke-opacity="0.8">
            <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="10s" repeatCount="indefinite" />
        </circle>
    </g>

    <circle cx="-45" cy="-55" r="1.5" fill="#FFF"><animate attributeName="opacity" values="0.1;1;0.1" dur="2s" repeatCount="indefinite"/></circle>
    <circle cx="50" cy="50" r="2" fill="#FFD700"><animate attributeName="opacity" values="0.2;0.8;0.2" dur="3s" repeatCount="indefinite"/></circle>
    <circle cx="70" cy="-20" r="1" fill="#FFF"><animate attributeName="opacity" values="0;1;0" dur="4s" repeatCount="indefinite"/></circle>
</g>

<g transform="translate(850, 275)">
    <circle cx="0" cy="0" r="50" fill="#0b0f17" fill-opacity="0.8" stroke="#FFD700" stroke-width="0.5" stroke-opacity="0.2" />
    <line x1="-55" y1="0" x2="55" y2="0" stroke="#FFD700" stroke-width="0.5" stroke-opacity="0.15" />
    <line x1="0" y1="-55" x2="0" y2="55" stroke="#FFD700" stroke-width="0.5" stroke-opacity="0.15" />
    
    <g>
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="5s" repeatCount="indefinite" />
        <path d="M 0 0 L 0 -50 A 50 50 0 0 1 35.35 -35.35 Z" fill="url(#goldLinear)" opacity="0.1" />
        <line x1="0" y1="0" x2="0" y2="-50" stroke="#FFD700" stroke-width="1" filter="url(#softGlow)" />
    </g>

    <g transform="rotate(-90)">
        <circle cx="0" cy="0" r="44" fill="none" stroke="#1A233A" stroke-width="4" />
        <circle cx="0" cy="0" r="44" fill="none" stroke="#FFD700" stroke-width="4" stroke-linecap="round" stroke-dasharray="276.46" stroke-dashoffset="27.64" filter="url(#softGlow)" />
        
        <circle cx="0" cy="0" r="34" fill="none" stroke="#1A233A" stroke-width="4" />
        <circle cx="0" cy="0" r="34" fill="none" stroke="#E6C200" stroke-width="4" stroke-linecap="round" stroke-dasharray="213.62" stroke-dashoffset="32.04" />
        
        <circle cx="0" cy="0" r="24" fill="none" stroke="#1A233A" stroke-width="4" />
        <circle cx="0" cy="0" r="24" fill="none" stroke="#CCAC00" stroke-width="4" stroke-linecap="round" stroke-dasharray="150.79" stroke-dashoffset="30.15" />
        
        <circle cx="0" cy="0" r="14" fill="none" stroke="#1A233A" stroke-width="4" />
        <circle cx="0" cy="0" r="14" fill="none" stroke="#B39700" stroke-width="4" stroke-linecap="round" stroke-dasharray="87.96" stroke-dashoffset="21.99" />
    </g>
</g>

<g transform="translate(630, 248)" font-family="'Courier New', monospace" font-size="12" font-weight="700">
    <g transform="translate(0, 0)">
        <text x="0" y="0" fill="#FFD700" filter="url(#softGlow)">Python</text>
        <path d="M 52 -3 L 170 -3 L 178 5" fill="none" stroke="#FFD700" stroke-opacity="0.5" stroke-dasharray="1 3" stroke-linecap="round" />
        <circle cx="178" cy="5" r="1.5" fill="#FFD700" />
    </g>
    
    <g transform="translate(45, 18)">
        <text x="0" y="0" fill="#E6C200">ML</text>
        <path d="M 20 -3 L 130 -3 L 140 5" fill="none" stroke="#E6C200" stroke-opacity="0.5" stroke-dasharray="1 3" stroke-linecap="round" />
        <circle cx="140" cy="5" r="1.5" fill="#E6C200" />
    </g>
    
    <g transform="translate(90, 36)">
        <text x="0" y="0" fill="#CCAC00">SQL</text>
        <path d="M 28 -3 L 105 -3 L 112 5" fill="none" stroke="#CCAC00" stroke-opacity="0.5" stroke-dasharray="1 3" stroke-linecap="round" />
        <circle cx="112" cy="5" r="1.5" fill="#CCAC00" />
    </g>
    
    <g transform="translate(135, 54)">
        <text x="0" y="0" fill="#B39700">BI</text>
        <path d="M 20 -3 L 80 -3 L 85 -10" fill="none" stroke="#B39700" stroke-opacity="0.5" stroke-dasharray="1 3" stroke-linecap="round" />
        <circle cx="85" cy="-10" r="1.5" fill="#B39700" />
    </g>
</g>
