<svg width="860" height="320" viewBox="0 0 860 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0d1117"/>
      <stop offset="50%"  stop-color="#161b22"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>

    <!-- Gold glow gradient -->
    <radialGradient id="glowCenter" cx="50%" cy="50%" r="55%">
      <stop offset="0%"   stop-color="#FFD700" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#FFD700" stop-opacity="0"/>
    </radialGradient>

    <!-- Shimmer for text line -->
    <linearGradient id="shimmer" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#FFD700" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#FFD700" stop-opacity="1"/>
      <stop offset="100%" stop-color="#FFD700" stop-opacity="0"/>
      <animateTransform attributeName="gradientTransform" type="translate" from="-1 0" to="1 0" dur="2.5s" repeatCount="indefinite"/>
    </linearGradient>

    <!-- Clip path -->
    <clipPath id="cardClip">
      <rect width="860" height="320" rx="18"/>
    </clipPath>

    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <filter id="softGlow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <g clip-path="url(#cardClip)">

    <!-- Base background -->
    <rect width="860" height="320" fill="url(#bgGrad)"/>

    <!-- Radial gold glow center -->
    <rect width="860" height="320" fill="url(#glowCenter)"/>

    <!-- ── ANIMATED GRID LINES ── -->
    <g opacity="0.07" stroke="#FFD700" stroke-width="0.7">
      <!-- Horizontal -->
      <line x1="0" y1="40"  x2="860" y2="40"/>
      <line x1="0" y1="80"  x2="860" y2="80"/>
      <line x1="0" y1="120" x2="860" y2="120"/>
      <line x1="0" y1="160" x2="860" y2="160"/>
      <line x1="0" y1="200" x2="860" y2="200"/>
      <line x1="0" y1="240" x2="860" y2="240"/>
      <line x1="0" y1="280" x2="860" y2="280"/>
      <!-- Vertical -->
      <line x1="86"  y1="0" x2="86"  y2="320"/>
      <line x1="172" y1="0" x2="172" y2="320"/>
      <line x1="258" y1="0" x2="258" y2="320"/>
      <line x1="344" y1="0" x2="344" y2="320"/>
      <line x1="430" y1="0" x2="430" y2="320"/>
      <line x1="516" y1="0" x2="516" y2="320"/>
      <line x1="602" y1="0" x2="602" y2="320"/>
      <line x1="688" y1="0" x2="688" y2="320"/>
      <line x1="774" y1="0" x2="774" y2="320"/>
    </g>

    <!-- ── ANIMATED SCANNING LINE ── -->
    <rect width="860" height="2" fill="url(#shimmer)" opacity="0.6">
      <animateTransform attributeName="transform" type="translate" from="0 -10" to="0 330" dur="4s" repeatCount="indefinite"/>
    </rect>

    <!-- ── FLOATING PARTICLES ── -->
    <!-- Particle 1 -->
    <circle cx="80" cy="60" r="2.5" fill="#FFD700" opacity="0.7" filter="url(#glow)">
      <animate attributeName="cy" values="60;40;60" dur="3.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.7;0.2;0.7" dur="3.2s" repeatCount="indefinite"/>
    </circle>
    <!-- Particle 2 -->
    <circle cx="200" cy="250" r="2" fill="#FFD700" opacity="0.5">
      <animate attributeName="cy" values="250;230;250" dur="4.1s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0.1;0.5" dur="4.1s" repeatCount="indefinite"/>
    </circle>
    <!-- Particle 3 -->
    <circle cx="750" cy="80" r="3" fill="#FFC107" opacity="0.6" filter="url(#glow)">
      <animate attributeName="cy" values="80;55;80" dur="2.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0.15;0.6" dur="2.8s" repeatCount="indefinite"/>
    </circle>
    <!-- Particle 4 -->
    <circle cx="600" cy="270" r="2" fill="#FFD700" opacity="0.45">
      <animate attributeName="cy" values="270;250;270" dur="3.7s" repeatCount="indefinite"/>
    </circle>
    <!-- Particle 5 -->
    <circle cx="400" cy="30" r="1.8" fill="#FFE57F" opacity="0.5">
      <animate attributeName="cy" values="30;15;30" dur="5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0.1;0.5" dur="5s" repeatCount="indefinite"/>
    </circle>
    <!-- Particle 6 -->
    <circle cx="820" cy="200" r="2.2" fill="#FFD700" opacity="0.55">
      <animate attributeName="cy" values="200;180;200" dur="3.5s" repeatCount="indefinite"/>
    </circle>
    <!-- Particle 7 -->
    <circle cx="50" cy="280" r="1.5" fill="#FFC107" opacity="0.4">
      <animate attributeName="cy" values="280;260;280" dur="4.5s" repeatCount="indefinite"/>
    </circle>
    <!-- Particle 8 -->
    <circle cx="500" cy="150" r="1.5" fill="#FFD700" opacity="0.3">
      <animate attributeName="opacity" values="0.3;0.7;0.3" dur="2s" repeatCount="indefinite"/>
    </circle>

    <!-- ── CORNER ACCENTS ── -->
    <!-- Top-left bracket -->
    <g stroke="#FFD700" stroke-width="2.5" fill="none" opacity="0.6">
      <polyline points="20,8 8,8 8,30"/>
    </g>
    <!-- Top-right bracket -->
    <g stroke="#FFD700" stroke-width="2.5" fill="none" opacity="0.6">
      <polyline points="840,8 852,8 852,30"/>
    </g>
    <!-- Bottom-left bracket -->
    <g stroke="#FFD700" stroke-width="2.5" fill="none" opacity="0.6">
      <polyline points="20,312 8,312 8,290"/>
    </g>
    <!-- Bottom-right bracket -->
    <g stroke="#FFD700" stroke-width="2.5" fill="none" opacity="0.6">
      <polyline points="840,312 852,312 852,290"/>
    </g>

    <!-- ── PULSING RING ── -->
    <circle cx="780" cy="260" r="50" stroke="#FFD700" stroke-width="1" fill="none" opacity="0.06">
      <animate attributeName="r" values="50;70;50" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.06;0.02;0.06" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="780" cy="260" r="30" stroke="#FFD700" stroke-width="1" fill="none" opacity="0.09">
      <animate attributeName="r" values="30;50;30" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.09;0.03;0.09" dur="4s" repeatCount="indefinite"/>
    </circle>

    <!-- ── LEFT GOLD ACCENT BAR ── -->
    <rect x="28" y="40" width="3" height="240" rx="2" fill="#FFD700" opacity="0.8" filter="url(#softGlow)">
      <animate attributeName="opacity" values="0.8;0.3;0.8" dur="3s" repeatCount="indefinite"/>
    </rect>

    <!-- ══════════════ TEXT CONTENT ══════════════ -->

    <!-- Name -->
    <text x="60" y="82" font-family="'Segoe UI', Arial, sans-serif" font-size="30" font-weight="700" fill="#FFD700" filter="url(#glow)">
      Harshit Goyal
      <animate attributeName="opacity" values="0;1" dur="0.8s" fill="freeze"/>
    </text>

    <!-- Role tag -->
    <rect x="60" y="92" width="245" height="22" rx="11" fill="#FFD700" fill-opacity="0.12" stroke="#FFD700" stroke-width="0.8" stroke-opacity="0.4"/>
    <text x="72" y="108" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#FFD700" opacity="0.9">⚡ Data Scientist &amp; ML Engineer</text>

    <!-- Divider line -->
    <line x1="60" y1="128" x2="380" y2="128" stroke="#FFD700" stroke-width="0.7" stroke-opacity="0.3"/>

    <!-- Bullet items — each fades in with a stagger -->

    <!-- Row 1 -->
    <text x="60" y="155" font-family="'Segoe UI', Arial, sans-serif" font-size="13.5" fill="#e6edf3" opacity="0">
      🎓  B.Tech IT @ RTU Kota (2022–2026)  |  CGPA: 8.45
      <animate attributeName="opacity" values="0;1" begin="0.3s" dur="0.6s" fill="freeze"/>
    </text>

    <!-- Row 2 -->
    <text x="60" y="178" font-family="'Segoe UI', Arial, sans-serif" font-size="13.5" fill="#e6edf3" opacity="0">
      💼  Data Science Intern @ C-DAC Pune (Ongoing)
      <animate attributeName="opacity" values="0;1" begin="0.6s" dur="0.6s" fill="freeze"/>
    </text>

    <!-- Row 3 -->
    <text x="60" y="201" font-family="'Segoe UI', Arial, sans-serif" font-size="13.5" fill="#e6edf3" opacity="0">
      📍  Ajmer, Rajasthan, India
      <animate attributeName="opacity" values="0;1" begin="0.9s" dur="0.6s" fill="freeze"/>
    </text>

    <!-- Row 4 -->
    <text x="60" y="224" font-family="'Segoe UI', Arial, sans-serif" font-size="13.5" fill="#e6edf3" opacity="0">
      🤖  Machine Learning · NLP · Data Analytics · LLMs
      <animate attributeName="opacity" values="0;1" begin="1.2s" dur="0.6s" fill="freeze"/>
    </text>

    <!-- Row 5 -->
    <text x="60" y="247" font-family="'Segoe UI', Arial, sans-serif" font-size="13.5" fill="#e6edf3" opacity="0">
      🌐  Web Apps: HTML · CSS · JS · Streamlit · Gradio
      <animate attributeName="opacity" values="0;1" begin="1.5s" dur="0.6s" fill="freeze"/>
    </text>

    <!-- Status badge -->
    <rect x="60" y="287" width="168" height="22" rx="11" fill="#22863a" fill-opacity="0.25" stroke="#3fb950" stroke-width="0.8" opacity="0">
      <animate attributeName="opacity" values="0;1" begin="2.1s" dur="0.6s" fill="freeze"/>
    </rect>
    <circle cx="74" cy="298" r="4" fill="#3fb950" opacity="0">
      <animate attributeName="opacity" values="0;1" begin="2.1s" dur="0.6s" fill="freeze"/>
      <animate attributeName="r" values="3;5;3" begin="2.2s" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <text x="84" y="303" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="600" fill="#3fb950" opacity="0">
      🟢 Open to Opportunities
      <animate attributeName="opacity" values="0;1" begin="2.1s" dur="0.6s" fill="freeze"/>
    </text>

    <!-- ── RIGHT SIDE: animated hexagonal data visual ── -->
    <!-- Hex 1 -->
    <polygon points="680,80 700,68 720,80 720,104 700,116 680,104" stroke="#FFD700" stroke-width="1.5" fill="#FFD700" fill-opacity="0.05" opacity="0.7">
      <animate attributeName="fill-opacity" values="0.05;0.15;0.05" dur="2.5s" repeatCount="indefinite"/>
    </polygon>
    <!-- Hex 2 -->
    <polygon points="720,80 740,68 760,80 760,104 740,116 720,104" stroke="#FFC107" stroke-width="1.5" fill="#FFC107" fill-opacity="0.05" opacity="0.6">
      <animate attributeName="fill-opacity" values="0.05;0.18;0.05" dur="3s" begin="0.5s" repeatCount="indefinite"/>
    </polygon>
    <!-- Hex 3 -->
    <polygon points="760,80 780,68 800,80 800,104 780,116 760,104" stroke="#FFD700" stroke-width="1.5" fill="#FFD700" fill-opacity="0.05" opacity="0.5">
      <animate attributeName="fill-opacity" values="0.05;0.12;0.05" dur="2.8s" begin="1s" repeatCount="indefinite"/>
    </polygon>
    <!-- Hex 4 -->
    <polygon points="700,116 720,104 740,116 740,140 720,152 700,140" stroke="#FFE57F" stroke-width="1.5" fill="#FFE57F" fill-opacity="0.05" opacity="0.65">
      <animate attributeName="fill-opacity" values="0.05;0.14;0.05" dur="3.5s" begin="0.3s" repeatCount="indefinite"/>
    </polygon>
    <!-- Hex 5 -->
    <polygon points="740,116 760,104 780,116 780,140 760,152 740,140" stroke="#FFD700" stroke-width="1.5" fill="#FFD700" fill-opacity="0.08" opacity="0.8">
      <animate attributeName="fill-opacity" values="0.08;0.2;0.08" dur="2.2s" repeatCount="indefinite"/>
    </polygon>
    <!-- Hex 6 -->
    <polygon points="780,116 800,104 820,116 820,140 800,152 780,140" stroke="#FFC107" stroke-width="1.5" fill="#FFC107" fill-opacity="0.05" opacity="0.55">
      <animate attributeName="fill-opacity" values="0.05;0.13;0.05" dur="4s" begin="0.7s" repeatCount="indefinite"/>
    </polygon>
    <!-- Hex 7 -->
    <polygon points="680,152 700,140 720,152 720,176 700,188 680,176" stroke="#FFD700" stroke-width="1.5" fill="#FFD700" fill-opacity="0.05" opacity="0.5">
      <animate attributeName="fill-opacity" values="0.05;0.15;0.05" dur="3.2s" begin="1.2s" repeatCount="indefinite"/>
    </polygon>
    <!-- Hex 8 -->
    <polygon points="720,152 740,140 760,152 760,176 740,188 720,176" stroke="#FFE57F" stroke-width="1.5" fill="#FFE57F" fill-opacity="0.06" opacity="0.7">
      <animate attributeName="fill-opacity" values="0.06;0.18;0.06" dur="2.7s" begin="0.4s" repeatCount="indefinite"/>
    </polygon>
    <!-- Hex 9 -->
    <polygon points="760,152 780,140 800,152 800,176 780,188 760,176" stroke="#FFD700" stroke-width="1.5" fill="#FFD700" fill-opacity="0.05" opacity="0.6">
      <animate attributeName="fill-opacity" values="0.05;0.16;0.05" dur="3.8s" begin="0.9s" repeatCount="indefinite"/>
    </polygon>

   
    <!-- Skill labels near hex -->
    <text x="700" y="218" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#FFD700" text-anchor="middle" opacity="0.7">Python</text>
    <text x="740" y="218" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#FFC107" text-anchor="middle" opacity="0.7">ML</text>
    <text x="780" y="218" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#FFE57F" text-anchor="middle" opacity="0.7">SQL</text>
    <text x="820" y="218" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#FFD700" text-anchor="middle" opacity="0.7">BI</text>

    <!-- Border -->
    <rect width="860" height="320" rx="18" fill="none" stroke="#FFD700" stroke-width="1" stroke-opacity="0.25"/>

  </g>
</svg>
