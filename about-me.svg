<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 350" width="100%" height="100%">
    <defs>
        <!-- Background Gradients -->
        <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#0f141e" />
            <stop offset="50%" stop-color="#080a0f" />
            <stop offset="100%" stop-color="#030406" />
        </linearGradient>

        <linearGradient id="lineGradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#FFD700" stop-opacity="0.8" />
            <stop offset="100%" stop-color="#FFD700" stop-opacity="0" />
        </linearGradient>

        <!-- Glow Filters -->
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="4" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
        
        <filter id="glow-strong" x="-30%" y="-30%" width="160%" height="160%">
            <feGaussianBlur stdDeviation="6" result="blur1" />
            <feGaussianBlur stdDeviation="2" result="blur2" />
            <feMerge>
                <feMergeNode in="blur1" />
                <feMergeNode in="blur2" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>

        <!-- Background Grid Pattern -->
        <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
            <rect width="40" height="40" fill="none" />
            <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1" />
        </pattern>

        <!-- Reusable Hexagon Shape (R=35) -->
        <g id="hex">
            <polygon points="0,-35 30.31,-17.5 30.31,17.5 0,35 -30.31,17.5 -30.31,-17.5" 
                     fill="#141824" fill-opacity="0.4" 
                     stroke="#FFD700" stroke-width="1.5" stroke-opacity="0.4">
                <animate attributeName="stroke-opacity" values="0.2;0.7;0.2" dur="4s" repeatCount="indefinite" />
            </polygon>
        </g>
        
        <g id="hex-filled">
            <polygon points="0,-35 30.31,-17.5 30.31,17.5 0,35 -30.31,17.5 -30.31,-17.5" 
                     fill="#FFD700" fill-opacity="0.1" 
                     stroke="#FFD700" stroke-width="2" stroke-opacity="0.8"/>
        </g>
    </defs>

    <!-- Base Background -->
    <rect width="1000" height="350" fill="url(#bgGradient)" rx="10" />
    <rect width="1000" height="350" fill="url(#grid)" rx="10" />

    <!-- Corner HUD Accents -->
    <g stroke="#FFD700" stroke-width="2" fill="none" stroke-opacity="0.7">
        <!-- Top Left -->
        <path d="M 20 50 L 20 20 L 50 20" filter="url(#glow)" />
        <path d="M 25 25 L 35 25" stroke-width="1" opacity="0.5" />
        <!-- Bottom Left -->
        <path d="M 20 300 L 20 330 L 50 330" filter="url(#glow)" />
        <!-- Top Right -->
        <path d="M 980 50 L 980 20 L 950 20" filter="url(#glow)" />
        <!-- Bottom Right -->
        <path d="M 980 300 L 980 330 L 950 330" filter="url(#glow)" />
    </g>

    <!-- Decorative Dots -->
    <g fill="#FFD700">
        <circle cx="450" cy="50" r="1.5" opacity="0.6"><animate attributeName="opacity" values="0.2;1;0.2" dur="3s" repeatCount="indefinite"/></circle>
        <circle cx="580" cy="180" r="1" opacity="0.4"/>
        <circle cx="320" cy="280" r="2" opacity="0.5"><animate attributeName="opacity" values="0.1;0.8;0.1" dur="5s" repeatCount="indefinite"/></circle>
        <circle cx="680" cy="300" r="1.5" opacity="0.3"/>
        <circle cx="150" cy="80" r="1" opacity="0.2"/>
    </g>

    <!-- Connecting Circuit Lines -->
    <g fill="none" stroke="#FFD700" stroke-width="1" stroke-opacity="0.2">
        <path d="M 370 155 L 430 155 L 450 182.5 L 640 182.5" />
        <circle cx="430" cy="155" r="2" fill="#FFD700" fill-opacity="0.5" />
        <path d="M 780 130 L 880 130 L 880 160" />
        <path d="M 120 220 L 120 250 L 160 250" stroke-opacity="0.1"/>
    </g>


    <!-- ================= LEFT SECTION ================= -->
    
    <!-- Vertical Glow Line -->
    <rect x="40" y="60" width="4" height="230" fill="#FFD700" filter="url(#glow)" />
    <rect x="40" y="60" width="4" height="230" fill="#FFF" opacity="0.6" />

    <!-- Name -->
    <text x="70" y="115" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="52" fill="#FFFFFF" letter-spacing="1.5">
        Harshit <tspan fill="#FFD700" filter="url(#glow)">Goyal</tspan>
    </text>

    <!-- Subtitle Pill -->
    <g transform="translate(70, 135)">
        <rect width="300" height="40" rx="20" fill="#FFD700" fill-opacity="0.08" stroke="#FFD700" stroke-opacity="0.4" stroke-width="1.5" />
        <!-- Data/Chart Icon -->
        <g stroke="#FFD700" stroke-width="2" stroke-linecap="round" fill="none" transform="translate(15, 10)">
            <path d="M4 18h14 M6 14v-6 M11 14v-9 M16 14v-4" />
        </g>
        <text x="45" y="25" font-family="'Courier New', Consolas, monospace" font-weight="600" font-size="14" fill="#D0D0D0" letter-spacing="1">
            DATA SCIENTIST &amp; ML ENGINEER
        </text>
    </g>

    <!-- Subtle Horizontal Divider -->
    <rect x="70" y="200" width="350" height="1" fill="url(#lineGradient)" />

    <!-- Binary/Tech Deco Text -->
    <text x="70" y="230" font-family="'Courier New', monospace" font-size="10" fill="#FFD700" opacity="0.3" letter-spacing="2">
        SYS.INIT // 01001000 01000111
    </text>
    <text x="70" y="245" font-family="'Courier New', monospace" font-size="10" fill="#FFF" opacity="0.2" letter-spacing="1">
        MODELS_DEPLOYED: TRUE | STATUS: OPTIMIZED
    </text>


    <!-- ================= RIGHT SECTION (UPGRADED) ================= -->

    <!-- Hexagon Skill Network -->
    <g transform="translate(720, 130)">
        
        <!-- Outer fading hexes for depth -->
        <use href="#hex" x="-60.62" y="-105" opacity="0.2" />
        <use href="#hex" x="60.62" y="105" opacity="0.2" />
        <use href="#hex" x="90.93" y="52.5" opacity="0.3" />

        <!-- Surrounding Skill Hexes -->
        <g text-anchor="middle" dominant-baseline="middle" font-family="system-ui, sans-serif" font-weight="600" font-size="14" fill="#E0E0E0">
            <!-- Top Left -->
            <use href="#hex" x="-30.31" y="-52.5" />
            <text x="-30.31" y="-52.5">ML</text>
            
            <!-- Top Right -->
            <use href="#hex" x="30.31" y="-52.5" />
            <text x="30.31" y="-52.5">DL</text>
            
            <!-- Left -->
            <use href="#hex" x="-60.62" y="0" />
            <text x="-60.62" y="0">SQL</text>
            
            <!-- Right -->
            <use href="#hex" x="60.62" y="0" />
            <text x="60.62" y="0">NLP</text>
            
            <!-- Bottom Left -->
            <use href="#hex" x="-30.31" y="52.5" />
            <text x="-30.31" y="52.5">BI</text>
            
            <!-- Bottom Right -->
            <use href="#hex" x="30.31" y="52.5" />
            <text x="30.31" y="52.5">CV</text>
        </g>

        <!-- Center Highlighted Hex -->
        <use href="#hex-filled" x="0" y="0" filter="url(#glow)" />
        <text x="0" y="2" text-anchor="middle" dominant-baseline="middle" font-family="system-ui, sans-serif" font-weight="900" font-size="22" fill="#FFFFFF" letter-spacing="1">
            HG
        </text>
        <circle cx="0" cy="0" r="28" fill="none" stroke="#FFD700" stroke-width="0.5" stroke-opacity="0.5" stroke-dasharray="4 4">
            <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="10s" repeatCount="indefinite" />
        </circle>
    </g>


    <!-- Advanced Radar / Data Visualizer -->
    <g transform="translate(880, 260)">
        <!-- Radar Base Rings -->
        <circle cx="0" cy="0" r="70" fill="#0a0d14" fill-opacity="0.6" stroke="#FFD700" stroke-width="1" stroke-opacity="0.2" />
        <circle cx="0" cy="0" r="50" fill="none" stroke="#FFD700" stroke-width="0.5" stroke-opacity="0.3" stroke-dasharray="2 4" />
        <circle cx="0" cy="0" r="30" fill="none" stroke="#FFD700" stroke-width="0.5" stroke-opacity="0.4" />
        <circle cx="0" cy="0" r="10" fill="none" stroke="#FFD700" stroke-width="1" stroke-opacity="0.6" />
        <circle cx="0" cy="0" r="2" fill="#FFD700" />

        <!-- Crosshairs -->
        <line x1="-75" y1="0" x2="75" y2="0" stroke="#FFD700" stroke-width="0.5" stroke-opacity="0.3" />
        <line x1="0" y1="-75" x2="0" y2="75" stroke="#FFD700" stroke-width="0.5" stroke-opacity="0.3" />

        <!-- Rotating Radar Elements -->
        <g>
            <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="6s" repeatCount="indefinite" />
            <!-- Radar Sweep Wedge -->
            <path d="M 0 0 L 0 -70 A 70 70 0 0 1 49.5 -49.5 Z" fill="#FFD700" opacity="0.1" />
            <!-- Scanning Line -->
            <line x1="0" y1="0" x2="0" y2="-70" stroke="#FFD700" stroke-width="1.5" stroke-opacity="0.8" filter="url(#glow)" />
        </g>

        <!-- Counter-rotating dashed ring -->
        <g>
            <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="12s" repeatCount="indefinite" />
            <circle cx="0" cy="0" r="60" fill="none" stroke="#FFD700" stroke-width="1" stroke-opacity="0.5" stroke-dasharray="10 15 2 15" />
        </g>

        <!-- Data Blips -->
        <circle cx="35" cy="-25" r="2.5" fill="#FFF" filter="url(#glow)">
            <animate attributeName="opacity" values="0;1;0" dur="2s" repeatCount="indefinite" />
        </circle>
        <circle cx="-45" cy="15" r="1.5" fill="#FFD700">
            <animate attributeName="opacity" values="0;0.8;0" dur="3s" repeatCount="indefinite" />
        </circle>
        <circle cx="15" cy="40" r="2" fill="#FFF" opacity="0.7" />
    </g>

</svg>
