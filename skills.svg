    <text x="120" y="201" font-family="'Segoe UI',Arial,sans-serif" font-size="8.5" fill="#FFD700" text-anchor="middle">sklearn</text>
    <rect x="148" y="191" width="44" height="13" rx="6" fill="#FFD700" fill-opacity="0.08"/>
    <text x="170" y="201" font-family="'Segoe UI',Arial,sans-serif" font-size="8.5" fill="#FFD700" text-anchor="middle">XGBoost</text>

    <!-- ══════════════════════════════════════════
         ROW 3 — Data Visualization  78%
    ══════════════════════════════════════════ -->
    <rect x="28" y="212" width="804" height="58" rx="10" fill="#ffffff" fill-opacity="0.03" stroke="#FFD700" stroke-width="0.6" stroke-opacity="0.2"/>
    <circle cx="65" cy="241" r="18" fill="#FFD700" fill-opacity="0.1" stroke="#FFD700" stroke-width="1" stroke-opacity="0.4"/>
    <text x="65" y="248" font-family="Arial" font-size="18" text-anchor="middle" fill="#FFD700">📊</text>
    <text x="98" y="237" font-family="'Segoe UI',Arial,sans-serif" font-size="14" font-weight="700" fill="#e6edf3">Data Visualization</text>
    <rect x="98" y="242" width="60" height="16" rx="8" fill="#4c9be8" fill-opacity="0.15" stroke="#4c9be8" stroke-width="0.7" stroke-opacity="0.5"/>
    <text x="128" y="254" font-family="'Segoe UI',Arial,sans-serif" font-size="9" font-weight="700" fill="#4c9be8" text-anchor="middle">ADVANCED</text>
    <rect x="200" y="234" width="560" height="14" rx="7" fill="#ffffff" fill-opacity="0.06"/>
    <g transform="translate(200,234)">
      <rect width="0" height="14" rx="7" fill="url(#bar78)" clip-path="url(#clip78)">
        <animate attributeName="width" from="0" to="437" begin="0.8s" dur="1.2s" fill="freeze" calcMode="spline" keySplines="0.22 1 0.36 1"/>
      </rect>
      <circle cx="437" cy="7" r="5" fill="#FFE57F" filter="url(#dotGlow)" opacity="0">
        <animate attributeName="opacity" values="0;1" begin="1.9s" dur="0.3s" fill="freeze"/>
      </circle>
    </g>
    <text x="772" y="246" font-family="'Segoe UI',Arial,sans-serif" font-size="13" font-weight="700" fill="#FFD700" opacity="0">
      78%
      <animate attributeName="opacity" values="0;1" begin="1.8s" dur="0.4s" fill="freeze"/>
    </text>
    <rect x="98" y="261" width="46" height="13" rx="6" fill="#FFD700" fill-opacity="0.08"/>
    <text x="121" y="271" font-family="'Segoe UI',Arial,sans-serif" font-size="8.5" fill="#FFD700" text-anchor="middle">Power BI</text>
    <rect x="150" y="261" width="42" height="13" rx="6" fill="#FFD700" fill-opacity="0.08"/>
    <text x="171" y="271" font-family="'Segoe UI',Arial,sans-serif" font-size="8.5" fill="#FFD700" text-anchor="middle">Tableau</text>

    <!-- ══════════════════════════════════════════
         ROW 4 — Web Development  72%
    ══════════════════════════════════════════ -->
    <rect x="28" y="282" width="804" height="58" rx="10" fill="#ffffff" fill-opacity="0.03" stroke="#FFD700" stroke-width="0.6" stroke-opacity="0.2"/>
    <circle cx="65" cy="311" r="18" fill="#FFD700" fill-opacity="0.1" stroke="#FFD700" stroke-width="1" stroke-opacity="0.4"/>
    <text x="65" y="318" font-family="Arial" font-size="18" text-anchor="middle" fill="#FFD700">🌐</text>
    <text x="98" y="307" font-family="'Segoe UI',Arial,sans-serif" font-size="14" font-weight="700" fill="#e6edf3">Web Development</text>
    <rect x="98" y="312" width="76" height="16" rx="8" fill="#3fb950" fill-opacity="0.12" stroke="#3fb950" stroke-width="0.7" stroke-opacity="0.5"/>
    <text x="136" y="324" font-family="'Segoe UI',Arial,sans-serif" font-size="9" font-weight="700" fill="#3fb950" text-anchor="middle">INTERMEDIATE</text>
