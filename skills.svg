         ROW 5 — C / C++  65%
    ══════════════════════════════════════════ -->
    <rect x="28" y="352" width="804" height="58" rx="10" fill="#ffffff" fill-opacity="0.03" stroke="#FFD700" stroke-width="0.6" stroke-opacity="0.2"/>
    <circle cx="65" cy="381" r="18" fill="#FFD700" fill-opacity="0.1" stroke="#FFD700" stroke-width="1" stroke-opacity="0.4"/>
