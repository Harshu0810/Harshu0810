<svg width="860" height="420" viewBox="0 0 860 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>

    <!-- Bar fill gradients -->
    <linearGradient id="bar90" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#b8860b"/>
      <stop offset="60%"  stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#FFE57F"/>
    </linearGradient>
    <linearGradient id="bar80" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#b8860b"/>
      <stop offset="60%"  stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#FFE57F"/>
    </linearGradient>
    <linearGradient id="bar78" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#b8860b"/>
      <stop offset="60%"  stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#FFE57F"/>
    </linearGradient>
    <linearGradient id="bar72" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#b8860b"/>
      <stop offset="60%"  stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#FFE57F"/>
    </linearGradient>
    <linearGradient id="bar65" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#b8860b"/>
      <stop offset="60%"  stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#FFE57F"/>
    </linearGradient>

    <!-- Shimmer sweep -->
    <linearGradient id="shimmerSwipe" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="white" stop-opacity="0"/>
      <stop offset="50%"  stop-color="white" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="dotGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <clipPath id="clip90"><rect x="0" y="0" width="504" height="14" rx="7"/></clipPath>
    <clipPath id="clip80"><rect x="0" y="0" width="448" height="14" rx="7"/></clipPath>
    <clipPath id="clip78"><rect x="0" y="0" width="437" height="14" rx="7"/></clipPath>
    <clipPath id="clip72"><rect x="0" y="0" width="403" height="14" rx="7"/></clipPath>
    <clipPath id="clip65"><rect x="0" y="0" width="364" height="14" rx="7"/></clipPath>

    <clipPath id="cardClip"><rect width="860" height="420" rx="18"/></clipPath>
  </defs>

  <g clip-path="url(#cardClip)">

    <!-- Background -->
    <rect width="860" height="420" fill="url(#bg)"/>

    <!-- Subtle grid -->
    <g stroke="#FFD700" stroke-width="0.5" opacity="0.05">
      <line x1="0" y1="84"  x2="860" y2="84"/>
      <line x1="0" y1="168" x2="860" y2="168"/>
      <line x1="0" y1="252" x2="860" y2="252"/>
      <line x1="0" y1="336" x2="860" y2="336"/>
      <line x1="215" y1="0" x2="215" y2="420"/>
      <line x1="430" y1="0" x2="430" y2="420"/>
      <line x1="645" y1="0" x2="645" y2="420"/>
    </g>

    <!-- Corner brackets -->
    <polyline points="22,10 10,10 10,34"  stroke="#FFD700" stroke-width="2.5" fill="none" opacity="0.7"/>
    <polyline points="838,10 850,10 850,34" stroke="#FFD700" stroke-width="2.5" fill="none" opacity="0.7"/>
    <polyline points="22,410 10,410 10,386" stroke="#FFD700" stroke-width="2.5" fill="none" opacity="0.7"/>
    <polyline points="838,410 850,410 850,386" stroke="#FFD700" stroke-width="2.5" fill="none" opacity="0.7"/>

    <!-- Pulsing particles -->
    <circle cx="820" cy="60"  r="2" fill="#FFD700" opacity="0.6"><animate attributeName="opacity" values="0.6;0.1;0.6" dur="2.8s" repeatCount="indefinite"/></circle>
    <circle cx="40"  cy="370" r="2" fill="#FFC107" opacity="0.5"><animate attributeName="opacity" values="0.5;0.1;0.5" dur="3.5s" repeatCount="indefinite"/></circle>
    <circle cx="750" cy="380" r="1.5" fill="#FFD700" opacity="0.4"><animate attributeName="opacity" values="0.4;0.9;0.4" dur="2.2s" repeatCount="indefinite"/></circle>
    <circle cx="100" cy="50"  r="1.5" fill="#FFE57F" opacity="0.45"><animate attributeName="opacity" values="0.45;0.1;0.45" dur="4s" repeatCount="indefinite"/></circle>

    <!-- ══ HEADER ══ -->
    <text x="430" y="46" font-family="'Segoe UI',Arial,sans-serif" font-size="22" font-weight="700" fill="#FFD700" text-anchor="middle" filter="url(#glow)">⚡ Skills &amp; Proficiency</text>
    <rect x="180" y="54" width="500" height="1.5" rx="1" fill="url(#shimmerSwipe)" opacity="0.6"/>

    <!-- ══════════════════════════════════════════
         ROW 1 — Python  90%
    ══════════════════════════════════════════ -->
    <!-- Card bg -->
    <rect x="28" y="72" width="804" height="58" rx="10" fill="#ffffff" fill-opacity="0.03" stroke="#FFD700" stroke-width="0.6" stroke-opacity="0.2"/>

    <!-- Icon circle -->
    <circle cx="65" cy="101" r="18" fill="#FFD700" fill-opacity="0.1" stroke="#FFD700" stroke-width="1" stroke-opacity="0.4"/>
    <text x="65" y="108" font-family="Arial" font-size="18" text-anchor="middle" fill="#FFD700">🐍</text>

    <!-- Skill name -->
    <text x="98" y="97" font-family="'Segoe UI',Arial,sans-serif" font-size="14" font-weight="700" fill="#e6edf3">Python</text>
    <!-- Badge: Expert -->
    <rect x="98" y="102" width="50" height="16" rx="8" fill="#FFD700" fill-opacity="0.15" stroke="#FFD700" stroke-width="0.7" stroke-opacity="0.5"/>
    <text x="123" y="114" font-family="'Segoe UI',Arial,sans-serif" font-size="9" font-weight="700" fill="#FFD700" text-anchor="middle">EXPERT</text>

    <!-- Bar track -->
    <rect x="200" y="94" width="560" height="14" rx="7" fill="#ffffff" fill-opacity="0.06"/>
    <!-- Bar fill -->
    <g transform="translate(200,94)">
      <rect width="0" height="14" rx="7" fill="url(#bar90)" clip-path="url(#clip90)">
        <animate attributeName="width" from="0" to="504" begin="0.2s" dur="1.2s" fill="freeze" calcMode="spline" keySplines="0.22 1 0.36 1"/>
      </rect>
      <!-- Shimmer on bar -->
      <rect width="504" height="14" rx="7" fill="url(#shimmerSwipe)" opacity="0" clip-path="url(#clip90)">
        <animate attributeName="opacity" values="0;0;0.6;0" begin="1.5s" dur="1s" fill="freeze"/>
        <animateTransform attributeName="transform" type="translate" from="-504 0" to="504 0" begin="1.5s" dur="1s" fill="freeze"/>
      </rect>
      <!-- Glow dot at tip -->
      <circle cx="504" cy="7" r="5" fill="#FFE57F" filter="url(#dotGlow)" opacity="0">
        <animate attributeName="opacity" values="0;1" begin="1.3s" dur="0.3s" fill="freeze"/>
      </circle>
    </g>
    <!-- Percentage label -->
    <text x="772" y="106" font-family="'Segoe UI',Arial,sans-serif" font-size="13" font-weight="700" fill="#FFD700" opacity="0">
      90%
      <animate attributeName="opacity" values="0;1" begin="1.2s" dur="0.4s" fill="freeze"/>
    </text>

    <!-- ══════════════════════════════════════════
         ROW 2 — Machine Learning  80%
    ══════════════════════════════════════════ -->
    <rect x="28" y="142" width="804" height="58" rx="10" fill="#ffffff" fill-opacity="0.03" stroke="#FFD700" stroke-width="0.6" stroke-opacity="0.2"/>
    <circle cx="65" cy="171" r="18" fill="#FFD700" fill-opacity="0.1" stroke="#FFD700" stroke-width="1" stroke-opacity="0.4"/>
    <text x="65" y="178" font-family="Arial" font-size="18" text-anchor="middle" fill="#FFD700">🤖</text>
    <text x="98" y="167" font-family="'Segoe UI',Arial,sans-serif" font-size="14" font-weight="700" fill="#e6edf3">Machine Learning</text>
