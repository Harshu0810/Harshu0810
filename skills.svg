    <g transform="translate(200,304)">
      <rect width="0" height="14" rx="7" fill="url(#bar72)" clip-path="url(#clip72)">
        <animate attributeName="width" from="0" to="403" begin="1.1s" dur="1.2s" fill="freeze" calcMode="spline" keySplines="0.22 1 0.36 1"/>
