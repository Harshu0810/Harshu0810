    <text x="98" y="377" font-family="'Segoe UI',Arial,sans-serif" font-size="14" font-weight="700" fill="#e6edf3">C / C++</text>
    <rect x="98" y="382" width="76" height="16" rx="8" fill="#3fb950" fill-opacity="0.12" stroke="#3fb950" stroke-width="0.7" stroke-opacity="0.5"/>
    <text x="136" y="394" font-family="'Segoe UI',Arial,sans-serif" font-size="9" font-weight="700" fill="#3fb950" text-anchor="middle">INTERMEDIATE</text>
    <rect x="200" y="374" width="560" height="14" rx="7" fill="#ffffff" fill-opacity="0.06"/>
