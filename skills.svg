    <rect x="200" y="164" width="560" height="14" rx="7" fill="#ffffff" fill-opacity="0.06"/>
    <g transform="translate(200,164)">
      <rect width="0" height="14" rx="7" fill="url(#bar80)" clip-path="url(#clip80)">
        <animate attributeName="width" from="0" to="448" begin="0.5s" dur="1.2s" fill="freeze" calcMode="spline" keySplines="0.22 1 0.36 1"/>
