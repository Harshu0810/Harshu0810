    <text x="772" y="316" font-family="'Segoe UI',Arial,sans-serif" font-size="13" font-weight="700" fill="#FFD700" opacity="0">
      72%
      <animate attributeName="opacity" values="0;1" begin="2.1s" dur="0.4s" fill="freeze"/>
    </text>
    <rect x="98" y="331" width="34" height="13" rx="6" fill="#FFD700" fill-opacity="0.08"/>
    <text x="115" y="341" font-family="'Segoe UI',Arial,sans-serif" font-size="8.5" fill="#FFD700" text-anchor="middle">HTML</text>
    <rect x="138" y="331" width="28" height="13" rx="6" fill="#FFD700" fill-opacity="0.08"/>
    <text x="152" y="341" font-family="'Segoe UI',Arial,sans-serif" font-size="8.5" fill="#FFD700" text-anchor="middle">CSS</text>
    <rect x="172" y="331" width="18" height="13" rx="6" fill="#FFD700" fill-opacity="0.08"/>
    <text x="181" y="341" font-family="'Segoe UI',Arial,sans-serif" font-size="8.5" fill="#FFD700" text-anchor="middle">JS</text>

