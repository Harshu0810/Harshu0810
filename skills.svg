    <rect x="124" y="401" width="26" height="13" rx="6" fill="#FFD700" fill-opacity="0.08"/>
    <text x="137" y="411" font-family="'Segoe UI',Arial,sans-serif" font-size="8.5" fill="#FFD700" text-anchor="middle">C++</text>
    <rect x="156" y="401" width="24" height="13" rx="6" fill="#FFD700" fill-opacity="0.08"/>
    <text x="168" y="411" font-family="'Segoe UI',Arial,sans-serif" font-size="8.5" fill="#FFD700" text-anchor="middle">DSA</text>

    <!-- Border -->
